name: Build Android APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      build_release:
        description: '构建 Release 版本'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            build-essential \
            git \
            openjdk-17-jdk-headless \
            zlib1g-dev \
            libncurses5-dev \
            libstdc++6 \
            liblzma-dev \
            autoconf \
            libtool \
            pkg-config \
            libffi-dev
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        pip install kivy==2.3.0 plyer==2.1.0
    
    - name: Build with Buildozer
      timeout-minutes: 120
      env:
          ANDROID_HOME: /tmp/android-sdk
          ANDROID_NDK_HOME: /tmp/android-ndk
          BUILDOZER_ACCEPT_SDK_LICENSE: "1"
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        # 预先创建 Android SDK 许可目录并接受许可
        mkdir -p ~/.android
        echo -e "\n# Accept licenses" > ~/.android/repositories.cfg
        if [ "${{ github.event.inputs.build_release }}" = "true" ]; then
          echo "Building RELEASE APK..."
          sed -i 's/release = 0/release = 1/' buildozer.spec
          buildozer android release
        else
          echo "Building DEBUG APK..."
          buildozer android debug
        fi
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: personalmanager-${{ github.sha }}-${{ github.run_number }}
        path: |
          bin/*.apk
        retention-days: 30
    
    - name: Print APK info
      run: |
        echo "=========================================="
        echo "✅ APK 构建成功！"
        echo "=========================================="
        ls -lh bin/*.apk
        echo "=========================================="
        echo "请在 Actions 页面的 Artifacts 区域下载 APK 文件"
        echo "=========================================="

  # 可选：自动发布到 GitHub Releases
  release:
    needs: build
    if: github.event.inputs.build_release == 'true' && success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Download APK artifact
      uses: actions/download-artifact@v4
      with:
        name: personalmanager-${{ github.sha }}-${{ github.run_number }}
        path: ./release/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: "Release v${{ github.run_number }}"
        files: ./release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
